name: Build and Publish Docker Image

on:
  push:
    branches: [ "main" ]
    tags: [ "v*" ]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Read version from docker-compose
        id: compose_ver
        env:
          REGISTRY: ${{ env.REGISTRY }}
          IMAGE_NAME: ${{ env.IMAGE_NAME }}
        run: |
          VER=$(sed -n "s|.*image:.*${REGISTRY}/${IMAGE_NAME}:\([0-9.]*\).*|\1|p" docker-compose.yml | head -1)
          echo "VERSION=${VER:-0.0.0}" >> $GITHUB_OUTPUT
          echo "Read version: ${VER:-0.0.0}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
            images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
            tags: |
              type=raw,value=latest
              type=semver,pattern={{version}}
              type=raw,value=${{ steps.compose_ver.outputs.VERSION }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # 仅在推送版本 tag 时：把 docker-compose.yml 里的默认镜像版本更新为该版本
  update-compose-version:
    needs: build-and-push
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Get version from tag
        id: ver
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Update docker-compose.yml image tag
        run: |
          VER="${{ steps.ver.outputs.VERSION }}"
          IMG="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}"
          sed -i "s|image: ${IMG}:[0-9.]*|image: ${IMG}:${VER}|" docker-compose.yml
          grep "image:.*${IMG}" docker-compose.yml

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docker-compose.yml
          if git diff --staged --quiet; then
            echo "No change in docker-compose.yml, skip commit."
          else
            git commit -m "chore: bump default image to ${{ steps.ver.outputs.VERSION }} [skip ci]"
            git push origin main
          fi
